name: security-audit

on:
  push:
    paths:
      - 'requirements.txt'
      - '.github/workflows/security-audit.yml'
  pull_request:
    paths:
      - 'requirements.txt'
      - '.github/workflows/security-audit.yml'
  schedule:
    # Lunes 09:00 UTC — auditoría semanal contra PyPI advisory DB.
    - cron: '0 9 * * 1'

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Run pip-audit (strict — bloquea si hay CVEs)
        # Después del upgrade mayor que cerró todos los CVEs conocidos
        # (aiohttp→3.13, Pillow→12.2, fastapi→0.125+starlette 0.49.1,
        # pdfplumber→0.11.9), el workflow vuelve a ser bloqueante.
        # Si un CVE nuevo aparece en una dep, el build falla y hay que
        # actualizar (o usar `--ignore-vuln CVE-XXXX-YYYYY` si es
        # un falso positivo justificado).
        run: pip-audit --strict --requirement requirements.txt
