# ============================================================
#  Alembic — migraciones de PostgreSQL (`db/migrations_alembic/`).
#
#  La URL real se setea en `env.py` leyendo `db.config.get_database_config()`
#  — misma fuente que usa la API y los scrapers. Esto evita duplicar
#  credenciales acá y mantiene una sola precedencia DATABASE_URL > split.
#
#  Uso:
#      alembic upgrade head          # aplica migraciones pendientes
#      alembic current               # versión actual en la DB
#      alembic history               # lista de migraciones
#      alembic revision -m "nombre"  # nueva migración vacía
#      alembic stamp head            # marca DB existente como "al día"
# ============================================================
[alembic]
script_location = db/migrations_alembic
# Timezone UTC para timestamps de los archivos de migración.
timezone = UTC
# Plantilla del nombre: 4 chars de epoch (año) + secuencia.
# `rev` genera el hex estándar de Alembic.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
# Tamaño máximo del slug en el nombre del archivo.
truncate_slug_length = 40
# NO usar `sqlalchemy.url` acá — se arma en `env.py` desde `db.config`
# para que rote con la misma lógica DATABASE_URL > split vars que el
# resto del proyecto.

[post_write_hooks]
# Deshabilitado por ahora. Se puede activar `black` o `ruff format`
# cuando se añada una toolchain de linting al repo.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
